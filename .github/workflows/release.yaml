---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    branches:
      - main
    paths:
      - sources/**
      - scripts/**
      - .mise.toml
      - .github/workflows/release.yaml
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Discover sources
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build matrix
        id: matrix
        # Enumerate sources/<owner>/<repo>/ and pre-compute everything a build
        # step needs so the matrix step itself is trivial. Same shape as the
        # discover step in pull-request.yaml.
        run: |
          matrix=$(find sources -mindepth 2 -maxdepth 2 -type d | sort \
            | jq -R -s -c '
              [ split("\n") | map(select(length > 0))[]
                | (split("/") | .[1:3]) as $p
                | {
                    name: ($p | join("/")),
                    dir:  ("sources/" + ($p | join("/"))),
                    out:  ("out/crds/" + ($p | join("__")) + ".yaml"),
                    artifact: ("crds-" + ($p | join("__")))
                  }
              ]
            ')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs:
      - prepare
    name: Build ${{ matrix.source.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        source: ${{ fromJSON(needs.prepare.outputs.matrix) }}
      fail-fast: false
      max-parallel: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked

      # Cache vendir's output AND (for kind sources) the extracted CRD YAML
      # so re-runs short-circuit. Key includes vendir.yml, kind.yaml (if
      # present), and the build scripts — any change to script logic forces
      # a clean rebuild instead of reusing a stale output.yaml.
      - name: Restore vendor cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vendor/${{ matrix.source.artifact }}
          key: vendor-${{ runner.os }}-${{ matrix.source.name }}-${{ hashFiles(format('{0}/vendir.yml', matrix.source.dir), format('{0}/kind.yaml', matrix.source.dir), format('{0}/extract.yaml', matrix.source.dir), 'scripts/build.sh', 'scripts/kind-extract.sh') }}

      - name: Extract CRDs
        env:
          VENDIR_GITHUB_API_TOKEN: ${{ github.token }}
          VENDOR_CACHE: ${{ github.workspace }}/out/vendor/${{ matrix.source.artifact }}
        run: mise run build "${{ matrix.source.dir }}" "${{ matrix.source.out }}"

      - name: Upload CRDs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.source.artifact }}
          path: ${{ matrix.source.out }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs:
      - build
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      packages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked

      - name: Download all CRDs artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: out/crds
          pattern: crds-*
          merge-multiple: true

      - name: Render merged site
        run: crd-schema-publisher convert -d out/crds -o out/site --render

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: out/site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish and sign OCI artifact
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          digest=$(flux push artifact \
            "oci://ghcr.io/${{ github.repository }}:latest" \
            --path=out/site \
            --source="${{ github.server_url }}/${{ github.repository }}" \
            --revision="${REF_NAME}@sha1:${{ github.sha }}" \
            --output=json | jq -r '.repository + "@" + .digest')
          cosign sign --yes "$digest"

  status:
    if: ${{ !cancelled() }}
    needs:
      - build
      - deploy
    name: Release Success
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "${{ toJSON(needs.*.result) }}"
