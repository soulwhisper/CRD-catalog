---
# Trigger CR is inline — flux-operator doesn't publish a sample FluxInstance
# as a release asset, and `distribution.version: "2.x"` is a moving target
# Renovate can't track.
apiVersion: vendir.k14s.io/v1alpha1
kind: Config
directories:
  - path: vendor/operator
    contents:
      - path: .
        githubRelease:
          slug: controlplaneio-fluxcd/flux-operator
          tag: v0.50.0
          assetNames:
            - install.yaml
          disableAutoChecksumValidation: true
  - path: vendor/cr
    contents:
      - path: .
        inline:
          paths:
            fluxinstance.yaml: |
              ---
              apiVersion: fluxcd.controlplane.io/v1
              kind: FluxInstance
              metadata:
                name: flux
                namespace: flux-system
              spec:
                distribution:
                  version: "2.x"
                  registry: ghcr.io/fluxcd
                  artifact: oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests:latest
                components:
                  - source-controller
                  - source-watcher
                  - kustomize-controller
                  - helm-controller
                  - notification-controller
                  - image-reflector-controller
                  - image-automation-controller
